name: Build Standalone Neovim AppImage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v2

      - name: Build Standalone AppImage Bundle
        run: |
          nix bundle --bundler github:ralismark/nix-appimage .#neovim
          # nix bundle names the output after the main binary, e.g. nvim.AppImage
          mv nvim.AppImage nvim-standalone.AppImage

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvim-standalone
          path: nvim-standalone.AppImage

      - name: Release AppImage
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: nvim-standalone.AppImage
          generate_release_notes: true
